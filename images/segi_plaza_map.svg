<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 735" width="1000" height="735" role="img" aria-labelledby="title desc">
  <title id="title">세기프라자 약도</title>
  <desc id="desc">청량리역, 신답역, 답십리역, 전농로터리시장을 기준으로 세기프라자의 위치를 단순화한 약도입니다.</desc>
  <defs>
    <style>
      .bg{fill:#f7f7f5}
      .block{fill:#e7e7e5}
      .park{fill:#dfead7}
      .water{fill:#cfe7ef}
      .road{fill:none;stroke:#fff;stroke-width:24;stroke-linecap:round;stroke-linejoin:round}
      .road-mid{fill:none;stroke:#fff;stroke-width:36;stroke-linecap:round;stroke-linejoin:round}
      .road-line{fill:none;stroke:#c5b164;stroke-width:20;stroke-linecap:round;stroke-linejoin:round}
      .road-name{font:700 18px/1.2 "Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;fill:#8b815f}
      .label{font:700 22px/1.2 "Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;fill:#6f6f6f}
      .small{font:600 17px/1.2 "Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;fill:#777}
      .tiny{font:600 14px/1.2 "Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;fill:#838383}
      .dest-title{font:800 34px/1.15 "Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;fill:#111}
      .dest-sub{font:600 17px/1.25 "Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;fill:#333}
      .station{font:800 22px/1.2 "Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;fill:#fff}
      .num{font:800 18px/1 "Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;fill:#111}
      .dot{fill:#767676}
      .shadow{filter:url(#shadow)}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
